<VirtualHost *:80>
    # The domain name or IP address users type to get here
    ServerName istart.net
    ServerAlias www.istart.net

    # The folder where your website's HTML/PHP files live
    DocumentRoot /var/www/html

    # Directory permissions
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Where Apache saves its error logs for troubleshooting
    ErrorLog ${APACHE_LOG_DIR}/istart_error.log
    CustomLog ${APACHE_LOG_DIR}/istart_access.log combined
</VirtualHost>
