<VirtualHost *:80>
    # The domain name or IP address users type to get here
    ServerName apple.com
    ServerAlias www.apple.com

    # The folder where your website's HTML/PHP files live
    DocumentRoot /var/www/html/restore/apple

    # Directory permissions
    <Directory /var/www/html/restore/apple>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Where Apache saves its error logs for troubleshooting
    ErrorLog ${APACHE_LOG_DIR}/frutinet.log
    CustomLog ${APACHE_LOG_DIR}/frutinet.log combined
</VirtualHost>
