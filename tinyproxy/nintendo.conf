<VirtualHost *:80>
    # The domain name or IP address users type to get here
    ServerName nintendo.com
    ServerAlias www.nintendo.com

    # The folder where your website's HTML/PHP files live
    DocumentRoot /var/www/html/restore/nintendo

    # Directory permissions
    <Directory /var/www/html/restore/nintendo>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Where Apache saves its error logs for troubleshooting
    ErrorLog ${APACHE_LOG_DIR}/nintendo_error.log
    CustomLog ${APACHE_LOG_DIR}/nintendo_access.log combined
</VirtualHost>
